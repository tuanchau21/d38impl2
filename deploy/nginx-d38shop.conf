# Nginx reverse proxy for d38shop (Next.js on Oracle Cloud VM)
# Copy or include this under http {} and adjust server_name, paths, and optional auth.
# Next.js app is assumed to listen on 127.0.0.1:3000.

upstream nextjs_d38shop {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Optional: uncomment to restrict /admin and /api/admin by IP (replace with your IPs)
# geo $admin_allowed {
#     default 0;
#     1.2.3.4 1;      # your office / VPN
#     5.6.7.8 1;      # optional second IP
# }

server {
    listen 80;
    server_name _;   # replace with your domain or VM hostname

    # Optional: SSL (uncomment after obtaining certs, e.g. certbot)
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/your-domain/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;

    # Optional: redirect HTTP to HTTPS when SSL is enabled
    # if ($scheme != "https") { return 301 https://$host$request_uri; }

    # Proxy headers for Next.js
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Optional: HTTP basic auth for /admin (uncomment and create .htpasswd first)
    # location /admin {
    #     auth_basic "Admin";
    #     auth_basic_user_file /etc/nginx/.htpasswd_d38shop;
    #     proxy_pass http://nextjs_d38shop;
    # }
    # location /api/admin {
    #     auth_basic "Admin API";
    #     auth_basic_user_file /etc/nginx/.htpasswd_d38shop;
    #     proxy_pass http://nextjs_d38shop;
    # }

    # Optional: IP allowlist for admin (uncomment and set geo block above)
    # location /admin {
    #     if ($admin_allowed = 0) { return 403; }
    #     proxy_pass http://nextjs_d38shop;
    # }
    # location /api/admin {
    #     if ($admin_allowed = 0) { return 403; }
    #     proxy_pass http://nextjs_d38shop;
    # }

    # Default: proxy everything to Next.js
    location / {
        proxy_pass http://nextjs_d38shop;
    }
}

# Optional: redirect www to non-www (adjust server_name)
# server {
#     listen 80;
#     server_name www.your-domain.com;
#     return 301 $scheme://your-domain.com$request_uri;
# }
